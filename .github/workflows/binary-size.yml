name: Binary Size
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'examples/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'src/**'
      - 'examples/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  binary-size:
    name: Binary Size
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft != true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
      - uses: tylerbutler/actions/setup-rust@769fc7847a0abf82ee2f724df9b65426dfb159b5 # ratchet:tylerbutler/actions/setup-rust@main
      - name: Build size check examples
        run: |
          cargo build --release --example size_check
          cargo build --release --example size_check_rustls --no-default-features --features rustls
      - uses: tylerbutler/actions/binary-size@769fc7847a0abf82ee2f724df9b65426dfb159b5 # ratchet:tylerbutler/actions/binary-size@main
        id: size
        with:
          paths: |
            target/release/examples/size_check
            target/release/examples/size_check_rustls
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # ratchet:marocchino/sticky-pull-request-comment@v3.0.2
        with:
          header: binary-size
          message: ${{ steps.size.outputs.report }}
