name: Coverage
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      code: ${{ github.event_name == 'push' || steps.filter.outputs.code == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # ratchet:dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  coverage:
    name: Code Coverage
    needs: [changes]
    if: needs.changes.outputs.code == 'true' && github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
      - uses: tylerbutler/actions/setup-rust@769fc7847a0abf82ee2f724df9b65426dfb159b5 # ratchet:tylerbutler/actions/setup-rust@main
        with:
          components: llvm-tools-preview
      - uses: tylerbutler/actions/install-tools@769fc7847a0abf82ee2f724df9b65426dfb159b5 # ratchet:tylerbutler/actions/install-tools@main
        with:
          tools: cargo-llvm-cov,cargo-nextest
      - name: Generate coverage
        run: cargo llvm-cov nextest --all-features --lcov --output-path lcov.info
      - uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # ratchet:codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
