name: Build
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      code: ${{ github.event_name == 'push' || steps.filter.outputs.code == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # ratchet:dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'examples/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  build:
    name: Build (${{ matrix.target }})
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
      - uses: tylerbutler/actions/setup-rust@769fc7847a0abf82ee2f724df9b65426dfb159b5 # ratchet:tylerbutler/actions/setup-rust@main
        with:
          targets: ${{ matrix.target }}
      - name: Check library compiles
        run: cargo check --target ${{ matrix.target }}
      - name: Check all features
        run: cargo check --all-features --target ${{ matrix.target }}

  # Gate job for required status check — reports a single fixed-name check
  # that passes when all matrix jobs pass (or are skipped).
  build-result:
    name: Build Result
    if: always()
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Check build matrix result
        run: |
          if [[ "${{ needs.build.result }}" == "failure" || "${{ needs.build.result }}" == "cancelled" ]]; then
            echo "Build matrix failed or was cancelled"
            exit 1
          fi
