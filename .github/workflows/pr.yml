name: PR Validation
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  # Semver compatibility check with PR comments
  semver:
    name: Semver Check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft != true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-rust
      - uses: ./.github/actions/install-tools
        with:
          tools: cargo-semver-checks
      - name: Get merge base
        id: merge-base
        run: |
          MERGE_BASE=$(git merge-base origin/main HEAD)
          echo "sha=$MERGE_BASE" >> "$GITHUB_OUTPUT"
      - name: Check semver compatibility
        id: semver
        env:
          MERGE_BASE_SHA: ${{ steps.merge-base.outputs.sha }}
        run: |
          set +e
          OUTPUT=$(cargo semver-checks --baseline-rev "$MERGE_BASE_SHA" --color never 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          {
            echo "output<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "has_breaking=$([[ $EXIT_CODE -ne 0 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Comment on PR with breaking changes
        if: steps.semver.outputs.has_breaking == 'true'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # ratchet:marocchino/sticky-pull-request-comment@v2
        with:
          header: semver-check
          message: |
            ## Semver Breaking Changes Detected

            This PR introduces API changes that may be semver-incompatible:

            ```
            ${{ steps.semver.outputs.output }}
            ```

            If these changes are intentional, please ensure the version bump reflects the breaking change.
      - name: Remove semver comment if no breaking changes
        if: steps.semver.outputs.has_breaking == 'false'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # ratchet:marocchino/sticky-pull-request-comment@v2
        with:
          header: semver-check
          delete: true

  # Changelog entry check
  changelog:
    name: Changelog
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft != true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: tylerbutler/actions/changie-check@a2b6f63843eb7510dbcba273bd6638615f668777 # ratchet:tylerbutler/actions/changie-check@main
        id: changelog
        with:
          base-sha: ${{ github.event.pull_request.base.sha }}
          head-sha: ${{ github.event.pull_request.head.sha }}
      - name: Comment with changelog preview
        if: steps.changelog.outputs.has-entries == 'true'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # ratchet:marocchino/sticky-pull-request-comment@v2
        with:
          header: changelog
          message: |
            ## Changelog Preview

            This PR adds the following changelog entries:

            ${{ steps.changelog.outputs.preview }}
      - name: Comment about missing changelog
        if: steps.changelog.outputs.has-entries == 'false' && steps.changelog.outputs.needs-entry == 'true'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # ratchet:marocchino/sticky-pull-request-comment@v2
        with:
          header: changelog
          message: |
            ## Missing Changelog Entry

            This PR includes commits with types that typically require a changelog entry (`${{ steps.changelog.outputs.commit-types-found }}`), but no changie fragment was found.

            To add one, run:

            ```
            changie new
            ```
      - name: Remove changelog comment
        if: steps.changelog.outputs.has-entries == 'false' && steps.changelog.outputs.needs-entry == 'false'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # ratchet:marocchino/sticky-pull-request-comment@v2
        with:
          header: changelog
          delete: true

  # Binary size tracking
  binary-size:
    name: Binary Size
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft != true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
      - uses: ./.github/actions/setup-rust
      - name: Build size check examples
        run: |
          cargo build --release --example size_check
          cargo build --release --example size_check_rustls --no-default-features --features rustls
      - uses: tylerbutler/actions/binary-size@a2b6f63843eb7510dbcba273bd6638615f668777 # ratchet:tylerbutler/actions/binary-size@main
        id: size
        with:
          paths: |
            target/release/examples/size_check
            target/release/examples/size_check_rustls
      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # ratchet:marocchino/sticky-pull-request-comment@v2
        with:
          header: binary-size
          message: ${{ steps.size.outputs.report }}
